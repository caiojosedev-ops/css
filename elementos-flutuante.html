<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Elementos Flutuantes </title>

     <style>
        body{
            border: 1px solid red;
        }

        .caixa{
            background-color: red;
            width: 180px;
            height: 180px;
            border: 3px solid purple;
            margin: 0.3em;
        }
        .esquerda{
            float: left;
            width: 100px;
            height: 100px;
            background-color: rgb(72, 72, 151);

        }


        .direita{
            float: right;
            width: 100px;
            height: 100px;
            background-color: rgb(250, 45, 55);
        }

    </style>
</head>
<body>
    <div class="caixa esquerda">
        caixa 1

    </div>

    <div class="caixa esquerda">
        caixa 2

    </div>

    <div class="caixa esquerda">
        caixa 3

    </div>

    <div class="caixa direita">
        caixa 1

    </div>

    <div class="caixa direita">
        caixa 2

    </div>

    <div class="caixa direita">
        caixa 3

    </div>

    

    


   
    
</body>
</html>
